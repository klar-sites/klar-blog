                    <div>
                      <div style={{ fontWeight: 700 }}>{doctor.name}</div>
                      <div style={{ fontSize: 13, color: "var(--text-secondary)" }}>
                        {doctor.specialty} · ${doctor.price}/hour
                      </div>
                    </div>
                  </div>
                  <div className="srow">
                    <Icon name="cal" /> {fmtLongDate(start)}
                  </div>
                  <div className="srow">
                    <Icon name="clock" /> {fmtTimeD(start)} – {fmtTimeD(end)}
                  </div>
                  {concerns && (
                    <div className="srow" style={{ alignItems: "flex-start" }}>
                      <Icon name="info" />
                      <span style={{ color: "var(--text-secondary)" }}>{concerns}</span>
                    </div>
                  )}
                </div>
                <div className="field">
                  <label className="label">
                    Phone — for an SMS confirmation (optional)
                  </label>
                  <input
                    className="input"
                    type="tel"
                    placeholder="+46 70 123 45 67"
                    value={phone}
                    onChange={(e) => setPhone(e.target.value)}
                  />
                </div>
              </div>
              <div className="modal-foot">
                <button className="btn btn-secondary" onClick={onClose} disabled={busy}>
                  Cancel
                </button>
                <button className="btn btn-primary" onClick={confirm} disabled={busy}>
                  {busy ? "Booking…" : "Confirm appointment"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* ════════════════ My appointments ════════════════ */
      function ApptRow({ b, onCancel, past }) {
        const s = new Date(b.start);
        const e = new Date(b.end);
        const doctor = DOC_BY_ID[b.doctorId] || { id: b.doctorId, name: b.doctorName };
        return (
          <div className="appt-row">
            <DocPhoto doctor={doctor} />
            <div className="appt-main">
              <div className="r">{b.doctorName}</div>
              <div className="u">{b.specialty || "Appointment"}</div>
            </div>
            <div className="appt-time">
              <div className="d">{fmtShortDate(s)}</div>
              <div className="t">
                {fmtTimeD(s)}–{fmtTimeD(e)}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <span
                className={
                  "badge " +
                  (b.status === "cancelled" ? "cancelled" : past ? "past" : "confirmed")
                }
              >
                {b.status === "cancelled" ? "cancelled" : past ? "past" : "confirmed"}
              </span>
              {onCancel && b.status === "confirmed" && !past && (
                <button className="btn btn-danger btn-sm" onClick={() => onCancel(b)}>
                  Cancel
                </button>
              )}
            </div>
          </div>
        );
      }

      function MyAppointments({ me, bookings, loading, onCancel, setView }) {
        const now = Date.now();
        const mine = bookings.filter((b) => b.userId === me.sub);
        const upcoming = mine
          .filter((b) => b.status === "confirmed" && new Date(b.end).getTime() >= now)
          .sort((a, b) => new Date(a.start) - new Date(b.start));
        const past = mine
          .filter((b) => b.status !== "confirmed" || new Date(b.end).getTime() < now)
          .sort((a, b) => new Date(b.start) - new Date(a.start));
        const todayCount = upcoming.filter((b) =>
          isSameDay(new Date(b.start), new Date()),
        ).length;

        return (
          <div className="page">
            <div className="page-head">
              <div>
                <div className="page-title">My appointments</div>
                <div className="page-sub">Everything you've booked, in one place.</div>
              </div>
              <button className="btn btn-primary" onClick={() => setView("appointment")}>
                <Icon name="plus" /> Book appointment
              </button>
            </div>

            <div className="grid-3">
              <div className="card stat">
                <div className="stat-label">
                  <Icon name="cal" /> Upcoming
                </div>
                <div className="stat-value">{upcoming.length}</div>
                <div className="stat-hint">confirmed appointments ahead</div>
              </div>
              <div className="card stat">
                <div className="stat-label">
                  <Icon name="clock" /> Today
                </div>
                <div className="stat-value">{todayCount}</div>
                <div className="stat-hint">
                  {todayCount === 1 ? "appointment today" : "appointments today"}
                </div>
              </div>
              <div className="card stat">
                <div className="stat-label">
                  <Icon name="users" /> Doctors
                </div>
                <div className="stat-value">{DOCTORS.length}</div>
                <div className="stat-hint">specialists available</div>
              </div>
            </div>

            <div className="section-title">Upcoming</div>
            {loading ? (
              <SkeletonRows />
            ) : upcoming.length === 0 ? (
              <div className="card">
                <EmptyState
                  icon="cal"
                  title="No upcoming appointments"
                  text="Book with a specialist to see it here."
                  action={
                    <button className="btn btn-primary" onClick={() => setView("appointment")}>
                      Find a doctor
                    </button>
                  }
                />
              </div>
            ) : (
              <div className="card">
                {upcoming.map((b) => (
                  <ApptRow key={b.id} b={b} onCancel={onCancel} />
                ))}
              </div>
            )}

            <div className="section-title" style={{ marginTop: 32 }}>
              Past &amp; cancelled
            </div>
            {past.length === 0 ? (
              <div className="card">
                <div className="empty" style={{ padding: 28 }}>
                  <p className="muted">Nothing here yet.</p>
                </div>
              </div>
            ) : (
              <div className="card">
                {past.map((b) => (
                  <ApptRow key={b.id} b={b} past />
                ))}
              </div>
            )}
          </div>
        );
      }

      /* ════════════════ Settings ════════════════ */
      function Settings({ settings, onSave, theme, setTheme }) {
        const [local, setLocal] = useState(settings);
        const [saving, setSaving] = useState(false);
        const toast = useToast();
        useEffect(() => setLocal(settings), [settings]);

        const save = async () => {
          setSaving(true);
          try {
            await onSave(local);
            toast("Settings saved", "success");
          } catch {
            toast("Could not save settings", "error");
          }
          setSaving(false);
        };
        const setTheme2 = (t) => {
          setLocal((s) => ({ ...s, theme: t }));
          setTheme(t);
        };

        return (
          <div className="page" style={{ maxWidth: 720 }}>
            <div className="page-head">
              <div>
                <div className="page-title">Settings</div>
                <div className="page-sub">
                  Preferences are stored privately to your account.
                </div>
              </div>
            </div>

            <div className="card card-pad" style={{ display: "flex", flexDirection: "column", gap: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}>
                <div>
                  <div style={{ fontWeight: 600 }}>Appearance</div>
                  <div className="tiny">Choose light or dark mode.</div>
                </div>
                <div className="theme-seg">
                  <button
                    className={local.theme === "light" ? "active" : ""}
                    onClick={() => setTheme2("light")}
                    style={{ width: "auto", padding: "0 14px", gap: 6 }}
                  >
                    <Icon name="sun" /> Light
                  </button>
                  <button
                    className={local.theme === "dark" ? "active" : ""}
                    onClick={() => setTheme2("dark")}
                    style={{ width: "auto", padding: "0 14px", gap: 6 }}
                  >
                    <Icon name="moon" /> Dark
                  </button>
                </div>
              </div>

              <div style={{ borderTop: "1px solid var(--border-color)" }} />

              <div className="field">
                <label className="label">Timezone</label>
                <select
                  className="select"
                  value={local.timezone}
                  onChange={(e) => setLocal((s) => ({ ...s, timezone: e.target.value }))}
                >
                  {TIMEZONES.map((tz) => (
                    <option key={tz} value={tz}>
                      {tz.replace("_", " ")}
                    </option>
                  ))}
                </select>
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}>
                <div>
                  <div style={{ fontWeight: 600 }}>Notifications</div>
                  <div className="tiny">Appointment reminders and updates.</div>
                </div>
                <div
                  className={"toggle" + (local.notifications ? " on" : "")}
                  onClick={() => setLocal((s) => ({ ...s, notifications: !s.notifications }))}
                  role="switch"
                  aria-checked={local.notifications}
                />
              </div>

              <div style={{ display: "flex", justifyContent: "flex-end" }}>
                <button className="btn btn-primary" onClick={save} disabled={saving}>
                  {saving ? "Saving…" : "Save changes"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* ════════════════ Admin (project owner only) ════════════════ */
      const miniBtn = {
        fontSize: "12px", padding: "5px 9px", border: "1px solid var(--border-color)",
        borderRadius: "var(--radius-sm)", background: "var(--bg-elevated)",
        color: "var(--text-secondary)", cursor: "pointer",
      };
      const sectionTitle = { fontSize: "14px", fontWeight: 700, margin: "0 0 var(--space-sm)" };

      function AdminDataRow({ dataKey, value, onSave, onDelete }) {
        const [editing, setEditing] = useState(false);
        const [draft, setDraft] = useState("");
        const pretty = JSON.stringify(value, null, 2);
        return (
          <div style={{ border: "1px solid var(--border-color)", borderRadius: "var(--radius-md)", padding: "var(--space-md)", marginBottom: "var(--space-sm)", background: "var(--bg-elevated)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: editing ? "var(--space-sm)" : 0 }}>
              <code style={{ fontSize: "13px", fontWeight: 600 }}>{dataKey}</code>
              <div style={{ display: "flex", gap: "var(--space-xs)" }}>
                {!editing && <button style={miniBtn} onClick={() => { setDraft(pretty); setEditing(true); }}>Edit</button>}
                {editing && <button style={miniBtn} onClick={() => { onSave(draft); setEditing(false); }}>Save</button>}
                {editing && <button style={miniBtn} onClick={() => setEditing(false)}>Cancel</button>}
                <button style={{ ...miniBtn, color: "var(--danger)" }} onClick={onDelete}>Delete</button>
              </div>
            </div>
            {editing ? (
              <textarea value={draft} onChange={(e) => setDraft(e.target.value)} spellCheck={false}
                style={{ width: "100%", minHeight: "90px", fontFamily: "monospace", fontSize: "12px", padding: "var(--space-sm)", borderRadius: "var(--radius-sm)", border: "1px solid var(--border-color)", background: "var(--bg-secondary)", color: "var(--text-primary)", resize: "vertical", boxSizing: "border-box" }} />
            ) : (
              <pre style={{ margin: 0, fontSize: "12px", color: "var(--text-secondary)", whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{pretty}</pre>
            )}
          </div>
        );
      }

      function AdminView({ client }) {
        const [users, setUsers] = useState(null);
        const [q, setQ] = useState("");
        const [selId, setSelId] = useState(null);
        const [detail, setDetail] = useState(null);
        const [detailLoading, setDetailLoading] = useState(false);
        const [err, setErr] = useState(null);
        const [newKey, setNewKey] = useState("");

        const loadUsers = useCallback(async () => {
          try { const r = await client.admin.listUsers({ limit: 200 }); setUsers(r.users); setErr(null); }
          catch (e) { setErr(e && e.status === 403 ? "You're not the admin of this project." : e.message || "Failed to load users"); }
        }, [client]);
        useEffect(() => { loadUsers(); }, [loadUsers]);

        const openUser = useCallback(async (id) => {
          setSelId(id); setDetail(null); setDetailLoading(true);
          try { setDetail(await client.admin.getUser(id)); }
          catch (e) { alert(e.message || "Failed to load user"); }
          finally { setDetailLoading(false); }
        }, [client]);
        const refreshDetail = useCallback(() => { if (selId != null) openUser(selId); }, [selId, openUser]);

        const removeUser = async () => {
          if (!detail) return;
          const who = detail.profile.name || detail.profile.email;
          if (!window.confirm(`Delete ${who}? Their saved data is removed; their appointments stay but lose their owner.`)) return;
          try { await client.admin.deleteUser(detail.profile.id); setSelId(null); setDetail(null); loadUsers(); }
          catch (e) { alert(e.message || "Delete failed"); }
        };
        const cancelRec = async (rec) => {
          try { await client.admin.updateRecord(rec.collection, rec.id, { status: "cancelled" }); refreshDetail(); loadUsers(); }
          catch (e) { alert(e.message || "Couldn't cancel"); }
        };
        const deleteRec = async (rec) => {
          if (!window.confirm("Delete this record permanently?")) return;
          try { await client.admin.deleteRecord(rec.collection, rec.id); refreshDetail(); loadUsers(); }
          catch (e) { alert(e.message || "Delete failed"); }
        };
        const saveData = async (key, raw) => {
          let value; try { value = JSON.parse(raw); } catch { alert("Value must be valid JSON."); return; }
          try { await client.admin.setUserData(detail.profile.id, key, value); refreshDetail(); }
          catch (e) { alert(e.message || "Save failed"); }
        };
        const addKey = async () => {
          const k = newKey.trim(); if (!k) return;
          try { await client.admin.setUserData(detail.profile.id, k, null); setNewKey(""); refreshDetail(); }
          catch (e) { alert(e.message || "Add failed"); }
        };
        const deleteData = async (key) => {
          if (!window.confirm(`Delete data key "${key}"?`)) return;
          try { await client.admin.deleteUserData(detail.profile.id, key); refreshDetail(); }
          catch (e) { alert(e.message || "Delete failed"); }
        };

        const s = q.trim().toLowerCase();
        const filtered = (users || []).filter((u) => !s || (u.name || "").toLowerCase().includes(s) || (u.email || "").toLowerCase().includes(s));

        return (
          <div className="page" style={{ maxWidth: 980 }}>
            <h1 style={{ marginBottom: "var(--space-xs)" }}>Admin</h1>
            <p style={{ color: "var(--text-secondary)", marginBottom: "var(--space-lg)" }}>
              See everyone who signed in, and edit their appointments and data.
            </p>
            {err && <div style={{ padding: "var(--space-md)", borderRadius: "var(--radius-md)", background: "var(--danger-soft)", color: "var(--danger)", marginBottom: "var(--space-md)" }}>{err}</div>}

            <div style={{ display: "flex", gap: "var(--space-lg)", alignItems: "flex-start", flexWrap: "wrap" }}>
              <div style={{ flex: "1 1 280px", minWidth: "260px", maxWidth: "360px" }}>
                <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search users…"
                  style={{ width: "100%", padding: "10px 12px", marginBottom: "var(--space-sm)", borderRadius: "var(--radius-md)", border: "1px solid var(--border-color)", background: "var(--bg-elevated)", color: "var(--text-primary)", boxSizing: "border-box" }} />
                {!users ? (
                  <div style={{ color: "var(--text-tertiary)", padding: "var(--space-md)" }}>Loading…</div>
                ) : filtered.length === 0 ? (
                  <div style={{ color: "var(--text-tertiary)", padding: "var(--space-md)" }}>No users.</div>
                ) : (
                  filtered.map((u) => {
                    const active = u.id === selId;
                    return (
                      <button key={u.id} onClick={() => openUser(u.id)}
                        style={{ display: "flex", alignItems: "center", gap: "var(--space-sm)", width: "100%", textAlign: "left", padding: "var(--space-sm)", marginBottom: "6px", borderRadius: "var(--radius-md)", cursor: "pointer", color: "var(--text-primary)", border: "1px solid " + (active ? "var(--accent)" : "var(--border-color)"), background: active ? "var(--accent-soft)" : "var(--bg-elevated)" }}>
                        <Avatar user={u} />
                        <span style={{ flex: 1, minWidth: 0 }}>
                          <span style={{ display: "block", fontWeight: 600, fontSize: "14px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{u.name || u.email}</span>
                          <span style={{ display: "block", fontSize: "12px", color: "var(--text-tertiary)" }}>{u.dataKeys} keys · {u.records} records</span>
                        </span>
                      </button>
                    );
                  })
                )}
              </div>

              <div style={{ flex: "2 1 420px", minWidth: "300px" }}>
                {selId == null ? (
                  <div style={{ padding: "var(--space-2xl)", textAlign: "center", color: "var(--text-tertiary)", border: "1px dashed var(--border-color)", borderRadius: "var(--radius-lg)" }}>
                    Select a user to see and edit their details.
                  </div>
                ) : detailLoading || !detail ? (
                  <div style={{ padding: "var(--space-2xl)", textAlign: "center", color: "var(--text-tertiary)" }}>Loading…</div>
                ) : (
                  <>
                    <div style={{ display: "flex", alignItems: "center", gap: "var(--space-md)", padding: "var(--space-lg)", borderRadius: "var(--radius-lg)", background: "var(--bg-elevated)", border: "1px solid var(--border-color)", marginBottom: "var(--space-lg)" }}>
                      <Avatar user={detail.profile} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: "17px" }}>{detail.profile.name || "—"}</div>
                        <div style={{ color: "var(--text-secondary)", fontSize: "13px" }}>{detail.profile.email}</div>
                      </div>
                      <button onClick={removeUser} style={{ padding: "8px 14px", borderRadius: "var(--radius-sm)", border: "none", background: "var(--danger-soft)", color: "var(--danger)", fontWeight: 600, cursor: "pointer" }}>Delete user</button>
                    </div>

                    <h2 style={sectionTitle}>Appointments ({detail.records.length})</h2>
                    {detail.records.length === 0 && <div style={{ color: "var(--text-tertiary)", marginBottom: "var(--space-md)" }}>No appointments.</div>}
                    {detail.records.map((rec) => {
                      const b = rec.data || {};
                      const cancelled = b.status === "cancelled";
                      return (
                        <div key={rec.id} style={{ display: "flex", alignItems: "center", gap: "var(--space-md)", padding: "var(--space-md)", marginBottom: "var(--space-sm)", borderRadius: "var(--radius-md)", border: "1px solid var(--border-color)", background: "var(--bg-elevated)", opacity: cancelled ? 0.6 : 1 }}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 600 }}>{b.doctorName || b.doctorId || rec.collection}</div>
                            <div style={{ fontSize: "12px", color: "var(--text-tertiary)" }}>
                              {b.start ? `${fmtShortDate(new Date(b.start))} ${fmtTimeD(new Date(b.start))}` : ""} · {b.status || "—"}
                            </div>
                          </div>
                          {!cancelled && <button style={miniBtn} onClick={() => cancelRec(rec)}>Cancel</button>}
                          <button style={{ ...miniBtn, color: "var(--danger)" }} onClick={() => deleteRec(rec)}>Delete</button>
                        </div>
                      );
                    })}

                    <h2 style={{ ...sectionTitle, marginTop: "var(--space-xl)" }}>Saved data ({Object.keys(detail.data).length})</h2>
                    {Object.keys(detail.data).length === 0 && <div style={{ color: "var(--text-tertiary)", marginBottom: "var(--space-sm)" }}>No stored data.</div>}
                    {Object.entries(detail.data).map(([k, v]) => (
                      <AdminDataRow key={k} dataKey={k} value={v} onSave={(raw) => saveData(k, raw)} onDelete={() => deleteData(k)} />
                    ))}
                    <div style={{ display: "flex", gap: "var(--space-sm)", marginTop: "var(--space-sm)" }}>
                      <input value={newKey} onChange={(e) => setNewKey(e.target.value)} placeholder="new-key"
                        style={{ flex: 1, padding: "8px 12px", borderRadius: "var(--radius-sm)", border: "1px solid var(--border-color)", background: "var(--bg-elevated)", color: "var(--text-primary)", boxSizing: "border-box" }} />
                      <button style={miniBtn} onClick={addKey} disabled={!newKey.trim()}>Add key</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ════════════════ App ════════════════ */
      const VIEW_TITLES = {
        appointment: "Appointment",
        my: "My Appointments",
        settings: "Settings",
        admin: "Admin",
      };

      function App() {
        const toast = useToast();
        const [authReady, setAuthReady] = useState(false);
        const [client, setClient] = useState(null);
        const [me, setMe] = useState(null);
        const [signingIn, setSigningIn] = useState(false);
        const [sdkError, setSdkError] = useState(null);

        const [view, setView] = useState("appointment");
        const [theme, setThemeState] = useState("dark");
        const [settings, setSettings] = useState(DEFAULT_SETTINGS);
        const [bookings, setBookings] = useState([]);
        const [loadingBookings, setLoadingBookings] = useState(true);
        const [modalCtx, setModalCtx] = useState(null);
        const [isAdmin, setIsAdmin] = useState(false);

        const applyTheme = useCallback((t) => {
          setThemeState(t);
          document.documentElement.setAttribute("data-theme", t);
        }, []);

        const refreshBookings = useCallback(() => {
          setLoadingBookings(true);
          Promise.resolve(AppointmentStore.getAll())
            .then((b) => setBookings(b))
            .catch(() => setBookings([]))
            .finally(() => setLoadingBookings(false));
        }, []);

        // Load the Klar Users SDK + wire auth lifecycle
        useEffect(() => {
          let unsub;
          (async () => {
            try {
              const mod = await import(/* @vite-ignore */ KLAR_HOST + "/sdk/users.js");
              const c = mod.createKlarUser({ projectId: PROJECT_ID });
              UserSettingsStore.setUser(c);
              AppointmentStore.setUser(c);
              setClient(c);
              setMe(c.getUser());
              setIsAdmin(!!(c.isAdmin && c.isAdmin()));
              unsub = c.onChange((u) => {
                setMe(u || null);
                setIsAdmin(!!(c.isAdmin && c.isAdmin()));
              });
            } catch (e) {
              console.warn("Klar Users SDK failed to load", e);
              setSdkError(e && e.message ? e.message : String(e));
            } finally {
              setAuthReady(true);
            }
          })();
          return () => {
            if (typeof unsub === "function") unsub();
          };
        }, []);

        // Once the owner is signed in, self-provision this app's email automations.
        useEffect(() => {
          if (isAdmin && client?.admin) {
            client.admin.ensureAutomations(KLAR_AUTOMATIONS).catch(() => {});
          }
        }, [isAdmin, client]);

        // When the signed-in user changes, load their settings + appointments
        useEffect(() => {
          if (!me) {
            applyTheme(theme);
            return;
          }
          let active = true;
          (async () => {
            const s = await UserSettingsStore.getSettings();
            if (!active) return;
            setSettings(s);
            applyTheme(s.theme || "dark");
          })();
          refreshBookings();
          return () => {
            active = false;
          };
        }, [me, applyTheme, refreshBookings]);

        const signIn = async () => {
          if (!client) {
            toast(
              sdkError
                ? "Sign-in unavailable: " + sdkError
                : "Sign-in unavailable — the Klar SDK didn't load.",
              "error",
            );
            return;
          }
          setSigningIn(true);
          try {
            await client.signIn();
          } catch (e) {
            toast("Sign-in cancelled.", "error");
          }
          setSigningIn(false);
        };
        const signOut = () => {
          client && client.signOut();
          setView("appointment");
        };

        const setTheme = (t) => {
          applyTheme(t);
          const s = { ...settings, theme: t };
          setSettings(s);
          UserSettingsStore.saveSettings(s).catch(() => {});
        };

        const saveSettings = async (s) => {
          await UserSettingsStore.saveSettings(s);
          setSettings(s);
          applyTheme(s.theme);
        };

        const confirmBooking = async (data) => {
          try {
            await AppointmentStore.create(data);
            setModalCtx(null);
            refreshBookings();
            toast("Appointment confirmed", "success");
          } catch (e) {
            toast(e.message || "Could not book", "error");
          }
        };

        const cancelBooking = async (b) => {
          if (!window.confirm("Cancel this appointment?")) return;
          try {
            await AppointmentStore.cancel(b.id);
            refreshBookings();
            toast("Appointment cancelled", "success");
          } catch (e) {
            toast(e.message || "Could not cancel", "error");
          }
        };

        if (!authReady) {
          return (
            <div className="splash">
              <div className="spinner" />
            </div>
          );
        }

        if (!me) {
          return (
            <Landing
              onSignIn={signIn}
              signingIn={signingIn}
              sdkError={sdkError}
              host={KLAR_HOST}
              theme={theme}
              setTheme={applyTheme}
            />
          );
        }

        return (
          <div className="app-shell">
            <Sidebar view={view} setView={setView} isAdmin={isAdmin} onSignOut={signOut} />
            <div className="app-body">
              <Topbar
                title={VIEW_TITLES[view] || "Appointment"}
                user={me}
                theme={theme}
                setTheme={setTheme}
                onSignOut={signOut}
                setView={setView}
                bookings={bookings}
                me={me}
              />
              <div className="view-scroll">
                {view === "appointment" ? (
                  <AppointmentView bookings={bookings} openModal={setModalCtx} />
                ) : view === "my" ? (
                  <MyAppointments
                    me={me}
                    bookings={bookings}
                    loading={loadingBookings}
                    onCancel={cancelBooking}
                    setView={setView}
                  />
                ) : view === "settings" ? (
                  <Settings
                    settings={settings}
                    onSave={saveSettings}
                    theme={theme}
                    setTheme={applyTheme}
                  />
                ) : view === "admin" && isAdmin ? (
                  <AdminView client={client} />
                ) : (
                  <AppointmentView bookings={bookings} openModal={setModalCtx} />
                )}
              </div>
            </div>

            {modalCtx && (
              <BookingModal
                ctx={modalCtx}
                me={me}
                onClose={() => setModalCtx(null)}
                onConfirm={confirmBooking}
              />
            )}
          </div>
        );
      }

      // Mount exactly once. Klar's preview re-runs this page from a serialized
      // snapshot of the editor's live DOM, which can execute this module TWICE.
      // The window flag makes any second run a no-op; clearing #root drops the
      // baked snapshot so the single real mount starts from an empty container.
      if (!window.__PULSE_MOUNTED__) {
        window.__PULSE_MOUNTED__ = true;
        const rootEl = document.getElementById("root");
        rootEl.innerHTML = "";
        ReactDOM.createRoot(rootEl).render(
          <ToastProvider>
            <App />
          </ToastProvider>,
        );
      }
    </script>
  </body>
</html>
