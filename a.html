<!DOCTYPE html><html lang="en" class="light"><head>

    <title>Nexus - Personal Blog | Fashion, Technology &amp; Lifestyle</title>
    <meta name="description" content="Explore the latest in fashion trends, technology insights, business strategies, and lifestyle inspiration on Nexus personal blog.">
    <link rel="stylesheet" href="/style.css">
    <script>
      (function() {
        try {
          var d = document.documentElement,
            c = d.classList;
          if (localStorage.getItem("theme") === "dark") {
            d.style.colorScheme = "dark";
            c.remove("light");
            c.add("dark");
          } else {
            d.style.colorScheme = "light";
            c.remove("dark");
            c.add("light");
          }
        } catch (e) {}
      })();
    </script>
    <script src="https://editor.klar.website/sdk/content-static.iife.js"></script>
    <script type="module" src="/script.js"></script>
    <script data-klar-config="">
      const config = {

.field-image     	:field(title: Image, name: image, type:image, order:2, col: 6, section:'Content'),
.field-category  	:field(title: Category, name: category, type:string, col:6, section:Meta, sectionOrder:2, options(vocab:categories)),

.field-readTime  	:field(title: Read time, name: readTime, type:string, order: 5, col: 6),
